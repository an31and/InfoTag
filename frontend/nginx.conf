server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — every unknown route serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html must revalidate on every visit. Without this, returning
    # browsers heuristically cache it and keep referencing hashed JS bundles
    # that a newer deploy has deleted — the site then loads for new visitors
    # but breaks for anyone who visited before the deploy.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Static assets cached aggressively
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Use-case clips — cache, but allow replacing them between deploys
    location /videos/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Never cache the service worker (it must update)
    location = /sw.js {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }
}
